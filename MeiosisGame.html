<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الانقسام المنصف - أقحوان</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet">
<link rel="icon" href="images/icon.png" type="image/png">

<style>
*{
  box-sizing:border-box;
  font-family:'Tajawal',sans-serif;
}

body{
  margin:0;
  padding:0;
  padding-top:160px;
  background:#f4f4f9;
}

/* ===== HEADER ===== */
header{
  background-color:#006400;
  color:white;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.header-logo-text{
  display:flex;
  align-items:center;
  gap:15px;
}

.header-logo{
  width:60px;
  border-radius:50%;
}

/* ===== NAV ===== */
nav{
  background-color:#228B22;
  position:fixed;
  top:100px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  z-index:999;
}

nav a, .nav-current{
  color:white;
  text-decoration:none;
  font-weight:bold;
  padding:8px 14px;
  border-radius:5px;
}

nav a:hover{
  background:#006400;
}

.nav-current{
  background:#006400;
  color:#ccc;
}

/* ===== GAME CARD ===== */
.container{
  max-width:1000px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.quiz-button{
  padding:12px 24px;
  background:#006400;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:18px;
  margin:10px;
  transition:0.3s;
}

.quiz-button:hover{
  background:#004d00;
}

.scoreboard{
  display:flex;
  justify-content:space-around;
  background:#f0fff0;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  font-size:20px;
}

.timer{
  font-size:20px;
  font-weight:bold;
  color:#b22222;
  margin-bottom:15px;
}

#choices button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#228B22;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:18px;
}

#choices button:hover{
  background:#006400;
}

#result{
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
  color:#006400;
}

.hidden{display:none}

/* ===== FOOTER ===== */
.site-footer{
  background:#006400;
  color:white;
  text-align:center;
  padding:30px 10px;
  margin-top:60px;
}

.scroll-top{
  margin-top:10px;
  background:#228B22;
  color:white;
  border:none;
  border-radius:30px;
  padding:8px 16px;
  cursor:pointer;
}

.scroll-top:hover{
  background:#004d00;
}
</style>
</head>

<body>

<header>
<div class="header-logo-text">
<img src="images/icon.png" class="header-logo">
<h1>أُقْحُوان</h1>
</div>
</header>

<nav>
<span class="nav-current">لعبة الانقسام المنصف</span>
<a href="index.html">الرئيسية</a>
<a href="lessonsInterface.html">الدروس</a>
<a href="examsinterface.html">اختبارات</a>
</nav>

<div class="container">

<div id="startScreen">
<h2>مراجعة تكوين الجاميتات عند الإنسان</h2>
<button class="quiz-button" onclick="startGame()">ابدأ اللعبة</button>
</div>

<div id="gameScreen" class="hidden">

<div class="scoreboard">
<div>الفريق 1: <span id="score1">0</span></div>
<div>الفريق 2: <span id="score2">0</span></div>
</div>

<div class="timer">⏳ الوقت المتبقي: <span id="time">15</span></div>

<h2 id="question"></h2>
<div id="choices"></div>

<div id="decision" class="hidden">
<p>🎁 تحتفظوا بالصندوق ولا تمرروه؟</p>
<button class="quiz-button" onclick="keepBox()">نحتفظ</button>
<button class="quiz-button" onclick="passBox()">نمرر</button>
</div>

<div id="result"></div>
<button class="quiz-button" onclick="nextQuestion()">السؤال التالي</button>

</div>
</div>

<footer class="site-footer">
<p>جميع الحقوق محفوظة © أُقْحُوان 2026</p>
<button class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ أعلى</button>
</footer>

<script>
let currentTeam=1;
let score1=0,score2=0;
let currentQuestionIndex=0;
let mysteryValue=0;
let timerInterval;
let timeLeft=15;

let questions=[ /* نفس 20 سؤال السابقة */ 
{question:"كم عدد الكروموسومات في الجاميت البشري؟",choices:["46","23","92","44"],correct:1},
{question:"في أي مرحلة يحدث العبور الوراثي؟",choices:["التمهيدي الأول","الاستوائي","النهائي","البيني"],correct:0},
{question:"الناتج النهائي للانقسام المنصف هو:",choices:["خليتان","أربع خلايا أحادية","خلية جسدية","ثماني خلايا"],correct:1},
{question:"الانقسام المنصف يحدث في:",choices:["الخلايا الجسدية","الخلايا الجنسية","الجلد","الدم"],correct:1},
{question:"عدد الانقسامات في الانقسام المنصف:",choices:["1","2","3","4"],correct:1},
{question:"الخلية الثنائية تحتوي:",choices:["n","2n","4n","n/2"],correct:1},
{question:"الخلية الأحادية تحتوي:",choices:["n","2n","4n","3n"],correct:0},
{question:"العبور الوراثي يزيد:",choices:["الطول","التنوع الوراثي","الانقسام","الحجم"],correct:1},
{question:"في الذكر ينتج:",choices:["4 حيوانات منوية","بويضة","2 خلايا","خلية جسدية"],correct:0},
{question:"في الأنثى ينتج:",choices:["بويضة وأجسام قطبية","4 بويضات","2 بويضات","خلية جسدية"],correct:0}
];

/* ===== RANDOM SHUFFLE ===== */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function startGame(){
shuffle(questions);
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");
loadQuestion();
}

function startTimer(){
timeLeft=15;
document.getElementById("time").innerText=timeLeft;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
applyWrongPenalty();
}
},1000);
}

function loadQuestion(){
let q=questions[currentQuestionIndex];
document.getElementById("question").innerText="دور الفريق "+currentTeam+": "+q.question;

let choicesDiv=document.getElementById("choices");
choicesDiv.innerHTML="";
q.choices.forEach((choice,index)=>{
let btn=document.createElement("button");
btn.innerText=choice;
btn.onclick=()=>checkAnswer(index);
choicesDiv.appendChild(btn);
});

document.getElementById("decision").classList.add("hidden");
document.getElementById("result").innerText="";
startTimer();
}

function checkAnswer(index){
clearInterval(timerInterval);
if(index===questions[currentQuestionIndex].correct){
generateMystery();
document.getElementById("decision").classList.remove("hidden");
}else{
applyWrongPenalty();
}
}

function applyWrongPenalty(){
if(currentTeam===1){score1-=50;document.getElementById("score1").innerText=score1;}
else{score2-=50;document.getElementById("score2").innerText=score2;}
document.getElementById("result").innerText="❌ خسارة -50 نقطة";
switchTeam();
}

function generateMystery(){
let values=[100,300,500,1000,-100,-500,-1000];
mysteryValue=values[Math.floor(Math.random()*values.length)];
}

function keepBox(){applyScore(currentTeam);}
function passBox(){applyScore(currentTeam===1?2:1);}

function applyScore(team){
if(team===1){score1+=mysteryValue;document.getElementById("score1").innerText=score1;}
else{score2+=mysteryValue;document.getElementById("score2").innerText=score2;}
document.getElementById("result").innerText="🎁 نتيجة الصندوق: "+mysteryValue;
switchTeam();
}

function switchTeam(){currentTeam=currentTeam===1?2:1;}

function nextQuestion(){
currentQuestionIndex++;
if(currentQuestionIndex>=questions.length){
alert("انتهت اللعبة!");
currentQuestionIndex=0;
shuffle(questions);
}
loadQuestion();
}
</script>

</body>
</html>
