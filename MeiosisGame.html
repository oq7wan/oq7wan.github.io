<div class="container">

<div id="startScreen">
<h2>مراجعة تكوين الجاميتات عند الإنسان</h2>
<button class="quiz-button" onclick="startGame()">ابدأ اللعبة</button>
</div>

<div id="gameScreen" class="hidden">

<div class="scoreboard">
<div>الفريق 1: <span id="score1">0</span></div>
<div>الفريق 2: <span id="score2">0</span></div>
</div>

<div class="timer">⏳ الوقت المتبقي: <span id="time">15</span></div>

<h2 id="question"></h2>
<div id="choices"></div>

<div id="decision" class="hidden">
<p>🎁 تحتفظوا بالصندوق ولا تمرروه ؟</p>
<button class="quiz-button" onclick="keepBox()">نحتفظ</button>
<button class="quiz-button" onclick="passBox()">نمرر</button>
</div>

<div id="result"></div>
<button class="quiz-button" onclick="nextQuestion()">السؤال التالي</button>

</div>

<script>
let currentTeam=1;
let score1=0,score2=0;
let currentQuestionIndex=0;
let mysteryValue=0;
let timerInterval;
let timeLeft=15;

let questions=[ /* نفس 20 سؤال السابقة */ 
{question:"كم عدد الكروموسومات في الغاميت البشري؟",choices:["46","23","92","44"],correct:1},
{question:"في أي مرحلة تحدث عملية العبور؟",choices:["التمهيدي الأول","الاستوائي الثاني","النهائي الأول","الانفصالي الثاني"],correct:0},
{question:"الناتج النهائي للانقسام المنصف هو:",choices:["خليتان أحادية المجموعة الكروموسومية","أربع خلايا أحادية المجموعة الكروموسومية","خليتان ثنائية المجموعة الكروموسومية","أربع خلايا ثنائية المجموعة الكروموسومية"],correct:1},
{question:"الانقسام المنصف يحدث في:",choices:["الخلايا الجسدية","الخلايا الجنسية","خلايا الجلد","خلايا الدم"],correct:1},
{question:"عدد الانقسامات في الانقسام المنصف:",choices:["1","2","3","4"],correct:1},
{question:"الخلية ثنائية المجموعة الكروموسومية عند الانسان تحتوي:",choices:["23","46","47","82"],correct:1},
{question:"الخلية أحادية المجموعة الكروموسومية عند الانسان تحتوي:",choices:["23","46","47","82"],correct:0},
{question:"العبور الوراثي يزيد:",choices:["الطول","التنوع الوراثي","الانقسام","الحجم"],correct:1},
{question:"في الذكر ينتج من انقسام خلية منوية أولية واحدة:",choices:["أربعة حيوانات منوية","بويضة","حيوان منوي و أجسام قطبية","حيوانين منويين"],correct:0},
{question:"في الأنثى ينتج من انقسام خلية بيضية أولية واحدة:",choices:["بويضة وأجسام قطبية","أربعة بويضات","بويضتان","حيوان منوي"],correct:0}
];

/* ===== RANDOM SHUFFLE ===== */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function startGame(){
shuffle(questions);
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");
loadQuestion();
}

function startTimer(){
timeLeft=15;
document.getElementById("time").innerText=timeLeft;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
applyWrongPenalty();
}
},1000);
}

function loadQuestion(){
let q=questions[currentQuestionIndex];
document.getElementById("question").innerText="دور الفريق "+currentTeam+": "+q.question;

let choicesDiv=document.getElementById("choices");
choicesDiv.innerHTML="";
q.choices.forEach((choice,index)=>{
let btn=document.createElement("button");
btn.innerText=choice;
btn.onclick=()=>checkAnswer(index);
choicesDiv.appendChild(btn);
});

document.getElementById("decision").classList.add("hidden");
document.getElementById("result").innerText="";
startTimer();
}

function checkAnswer(index){
clearInterval(timerInterval);
if(index===questions[currentQuestionIndex].correct){
generateMystery();
document.getElementById("decision").classList.remove("hidden");
}else{
applyWrongPenalty();
}
}

function applyWrongPenalty(){
if(currentTeam===1){score1-=50;document.getElementById("score1").innerText=score1;}
else{score2-=50;document.getElementById("score2").innerText=score2;}
document.getElementById("result").innerText="❌ خسارة -50 نقطة";
switchTeam();
}

function generateMystery(){
let values=[100,300,500,1000,-100,-500,-1000];
mysteryValue=values[Math.floor(Math.random()*values.length)];
}

function keepBox(){applyScore(currentTeam);}
function passBox(){applyScore(currentTeam===1?2:1);}

function applyScore(team){
if(team===1){score1+=mysteryValue;document.getElementById("score1").innerText=score1;}
else{score2+=mysteryValue;document.getElementById("score2").innerText=score2;}
document.getElementById("result").innerText="🎁 نتيجة الصندوق: "+mysteryValue;
switchTeam();
}

function switchTeam(){currentTeam=currentTeam===1?2:1;}

function nextQuestion(){
currentQuestionIndex++;
if(currentQuestionIndex>=questions.length){
alert("انتهت اللعبة!");
currentQuestionIndex=0;
shuffle(questions);
}
loadQuestion();
}

function scrollToTop() {
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }

const nav = document.querySelector('nav');
  const hamburger = document.querySelector('.hamburger');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    nav.classList.toggle('open');

    // Update aria-expanded for accessibility
    const expanded = hamburger.classList.contains('active');
    hamburger.setAttribute('aria-expanded', expanded);
  });
   
</script>
